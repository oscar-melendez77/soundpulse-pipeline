    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

    .ticker-track span { font-family: var(--mono); font-size: .95rem; font-weight: 700;

    .ticker-track span.d { color: var(--aqua); }
    @keyframes scroll { from { transform: translateX(0) } to { transform: translateX(-50%) } }

    /* ─────────── SECTION SHELL ─────────── */
    section.block { padding: 5.5rem 0; border-bottom: var(--edge); }

    @media (max-width: 720px){

    <div id="work-list"></div>
  </section>

  <!-- ── CONTACT ── -->
  <section id="contact" class="rv">
    <p class="contact-k">Let's build something</p>
    <div class="contact-big">Get in <span style="font-style:italic;color:var(--accent)">touch</span>.</div>
    <a class="contact-big contact-mail" id="contact-mail" href="#" style="font-size:clamp(1.1rem,3vw,2rem)"></a>
    <div class="contact-links">
      <a class="btn solid" id="c-github" href="#" target="_blank" rel="noopener">GitHub ↗</a>
      <a class="btn" id="c-linkedin" href="#" target="_blank" rel="noopener">LinkedIn ↗</a>
    </div>
  </section>

</div>

<footer>
  <div class="wrap foot-in">
    <span id="foot-name"></span>
    <span>Guatemala · <span id="foot-year"></span></span>
    <span>Built &amp; deployed via GitHub Actions</span>
  </div>
</footer>

<script>
  /* ── Render everything from the PROFILE config ── */
  const $ = id => document.getElementById(id);

  // Nav + hero
  const initials = PROFILE.name.split(/\s+/).filter(Boolean).map(w => w[0]).slice(0,2).join("").toUpperCase();
  $("nav-name").textContent = PROFILE.name;
  $("mono").textContent = initials;
  $("hero-loc").textContent = PROFILE.location;
  // stylize the name: keep "J." accent
  $("hero-name").innerHTML = PROFILE.name.replace(/\bJ\.\b/, '<span class="amp">J.</span>');
  $("hero-role").textContent = PROFILE.title;
  $("hero-tagline").innerHTML = PROFILE.tagline.replace(/production intelligence/i, '<span class="mark">production intelligence</span>');
  $("hero-github").href = PROFILE.github;
  $("hero-linkedin").href = PROFILE.linkedin;
  document.title = PROFILE.name + " — Portfolio";

  // Equalizer bars
  const eq = $("eq");
  for (let i = 0; i < 34; i++) {
    const s = document.createElement("span");
    const dur = (0.7 + Math.random() * 0.9).toFixed(2);
    const del = (Math.random() * -1.4).toFixed(2);
    s.style.animationDuration = dur + "s";
    s.style.animationDelay = del + "s";
    eq.appendChild(s);
  }

  // Ticker — flatten unique skills
  const allSkills = [...new Set(Object.values(PROFILE.skills).flat())];
  const ticker = $("ticker");
  const buildTicker = () => allSkills.map(s =>
    `<span>${s}</span><span class="d">◆</span>`).join("");
  ticker.innerHTML = buildTicker() + buildTicker(); // duplicate for seamless loop

  // About
  $("about-text").textContent = PROFILE.about;

  // Fact card
  const langs = PROFILE.languages.map(l =>
    `<div>${l.name}<span class="lvl">${l.level}</span></div>`).join("");
  const hobbies = PROFILE.hobbies.map(h =>
    `<div>${h.label}</div>`).join("");
  $("fact-card").innerHTML = `
    <div class="fact-title">Fact Sheet</div>
    <div class="fact-row"><span class="fact-k">Location</span><span class="fact-v">${PROFILE.location}</span></div>
    <div class="fact-row"><span class="fact-k">Email</span><span class="fact-v"><a href="mailto:${PROFILE.email}">${PROFILE.email}</a></span></div>
    <div class="fact-row"><span class="fact-k">Focus</span><span class="fact-v">Data · ML · Analytics</span></div>
    <div class="fact-block"><span class="fact-k">Languages</span><div class="fact-list">${langs}</div></div>
    <div class="fact-block"><span class="fact-k">Off the clock</span><div class="fact-list">${hobbies}</div></div>`;

  // Skills
  const sg = $("skills-grid");
  Object.entries(PROFILE.skills).forEach(([group, tags], i) => {
    const div = document.createElement("div");
    div.className = "skill-group";
    div.innerHTML = `
      <div class="sg-head"><span class="sg-i">${String(i+1).padStart(2,"0")}</span>
      <span class="sg-name">${group}</span></div>
      <div class="skill-tags">${tags.map(t => `<span class="skill-tag">${t}</span>`).join("")}</div>`;
    sg.appendChild(div);
  });

  // Work
  const wl = $("work-list");
  PROFILE.projects.forEach((p, i) => {
    const isLive = p.badge === "Live";
    const badgeCls = isLive ? "badge-live" : "badge-wip";
    const live = p.link && p.link !== "#";
    const primary = live
      ? `<a class="btn solid" href="${p.link}" target="_blank" rel="noopener">${p.label} ↗</a>`
      : `<span class="btn disabled">${p.label}</span>`;
    const arch = p.archLink
      ? `<a class="btn ghost" href="${p.archLink}" target="_blank" rel="noopener">Architecture ↗</a>` : "";
    const item = document.createElement("div");
    item.className = "work-item";
    item.innerHTML = `
      <div>
        <div class="work-index">${String(i+1).padStart(2,"0")}</div>
        <span class="work-badge ${badgeCls}">${p.badge}</span>
      </div>
      <div>
        <div class="work-name">${p.name}</div>
        <p class="work-desc">${p.description}</p>
        <ul class="work-hl">${p.highlights.map(h => `<li>${h}</li>`).join("")}</ul>
        <div class="work-tags">${p.tags.map(t => `<span class="work-tag">${t}</span>`).join("")}</div>
        <div class="work-cta">${primary}${arch}</div>
      </div>`;
    wl.appendChild(item);
  });

  // Contact
  const cm = $("contact-mail");
  cm.textContent = PROFILE.email;
  cm.href = "mailto:" + PROFILE.email;
  $("c-github").href = PROFILE.github;
  $("c-linkedin").href = PROFILE.linkedin;
  $("foot-name").textContent = "© " + PROFILE.name;
  $("foot-year").textContent = new Date().getFullYear();

  // Scroll reveal
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll(".rv").forEach(el => io.observe(el));
</script>
</body>
</html>
